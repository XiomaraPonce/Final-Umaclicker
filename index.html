<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Uma Clicker</title>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>
  <h1>Run!</h1>

  <button type="button" id="umaButton">
    <img id="umaCharacter" src="" alt="Uma character">
  </button>

  <div id="umaDisplay">You have ran 0 Miles.</div>

  <script>
    const chibiCharacters = [
      "assets/img/CurrenChanChibi1.webp",
      "assets/img/GoldShipChibi1.webp",
      "assets/img/HaruUraraChibi1.webp",
      "assets/img/MatikaneTannhauserChibi1.webp",
      "assets/img/NiceNatureChibi1.webp"
    ];

    const backgrounds = [
      "assets/img/umaclickerbg1.png",
      "assets/img/umaclickerbg2.png",
      "assets/img/umaclickerbg3.png",
      "assets/img/umaclickerbg4.png",
      "assets/img/umaclickerbg5.png"
    ];

    const randomCharacter =
      chibiCharacters[Math.floor(Math.random() * chibiCharacters.length)];

    const randomBackground =
      backgrounds[Math.floor(Math.random() * backgrounds.length)];

    document.getElementById("umaCharacter").src = randomCharacter;
    document.body.style.backgroundImage = `url('${randomBackground}')`;
  </script>

  <script src="./assets/js/main.js"></script>
</body>
</html>
